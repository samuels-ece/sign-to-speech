<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign to Speech</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<style>
  :root { --ink:#1a1f1c; --paper:#f7f5f0; --moss:#3d5a4c; --moss-light:#6b8c7a; --amber:#c9832f; --line:#d9d4c8; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px 64px; }
  header { text-align: center; max-width: 560px; margin-bottom: 28px; }
  h1 { font-size: 2rem; font-weight: 400; color: var(--moss); }
  h1 span { color: var(--amber); font-style: italic; }
  p.sub { font-family: sans-serif; font-size: 0.92rem; color: #6b6558; margin-top: 8px; line-height: 1.5; }
  .stage { position: relative; width: min(640px, 92vw); aspect-ratio: 4/3; border-radius: 4px; overflow: hidden; border: 1px solid var(--line); background: #101410; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
  video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
  .readout { width: min(640px, 92vw); margin-top: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; font-family: sans-serif; }
  .sign-label { font-family: Georgia, serif; font-size: 1.6rem; color: var(--moss); min-height: 2.2rem; }
  .sign-label.idle { color: #b3ac9c; font-size: 1rem; font-style: italic; }
  button { font-family: sans-serif; font-size: 0.85rem; padding: 10px 20px; border-radius: 3px; border: 1px solid var(--moss); background: transparent; color: var(--moss); cursor: pointer; }
  button:disabled { opacity: 0.4; }
  .vocab { width: min(640px, 92vw); margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--line); font-family: sans-serif; }
  .vocab-title { font-size: 0.75rem; text-transform: uppercase; color: var(--amber); margin-bottom: 10px; }
  .vocab-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .vocab-item { font-size: 0.85rem; padding: 5px 12px; background: white; border: 1px solid var(--line); border-radius: 20px; color: #4a463c; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #c94f2f; margin-right: 6px; }
  .status-dot.live { background: var(--moss-light); }
</style>
</head>
<body>

<header>
  <h1>Sign <span>to</span> Speech</h1>
  <p class="sub">Hold a sign steady in front of your camera — when recognized, it's spoken aloud.</p>
</header>

<div class="stage">
  <video id="video" playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div class="readout">
  <div id="signLabel" class="sign-label idle">waiting for camera…</div>
  <button id="startBtn">Start camera</button>
</div>

<div class="vocab">
  <div class="vocab-title"><span class="status-dot" id="statusDot"></span>Starter vocabulary</div>
  <div class="vocab-list">
    <span class="vocab-item">👍 Thumbs up → "Yes"</span>
    <span class="vocab-item">👎 Thumbs down → "No"</span>
    <span class="vocab-item">✋ Open palm → "Hello"</span>
    <span class="vocab-item">✊ Fist → "Stop"</span>
    <span class="vocab-item">✌️ Peace sign → "Peace"</span>
    <span class="vocab-item">🤟 I love you → "I love you"</span>
    <span class="vocab-item">☝️ Point up → "Wait"</span>
  </div>
</div>

<script>
const videoEl = document.getElementById('video');
const canvasEl = document.getElementById('canvas');
const ctx = canvasEl.getContext('2d');
const signLabel = document.getElementById('signLabel');
const startBtn = document.getElementById('startBtn');
const statusDot = document.getElementById('statusDot');

let lastSpoken = "";
let lastSpokenTime = 0;
let stableSign = "";
let stableCount = 0;
const STABLE_FRAMES_NEEDED = 8;
const SPEAK_COOLDOWN_MS = 2500;

function speak(text) {
  const now = Date.now();
  if (text === lastSpoken && now - lastSpokenTime < SPEAK_COOLDOWN_MS) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.95;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
  lastSpoken = text;
  lastSpokenTime = now;
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y, (a.z||0) - (b.z||0));
}

function fingerStates(lm) {
  const wrist = lm[0];
  function extended(tip, pip) {
    return dist(lm[tip], wrist) > dist(lm[pip], wrist) * 1.15;
  }
  return {
    thumb: dist(lm[4], lm[17]) > dist(lm[2], lm[17]) * 1.1,
    index: extended(8, 6),
    middle: extended(12, 10),
    ring: extended(16, 14),
    pinky: extended(20, 18)
  };
}

function classifySign(lm) {
  const f = fingerStates(lm);
  if (f.thumb && f.index && f.middle && f.ring && f.pinky) return "Hello";
  if (!f.thumb && !f.index && !f.middle && !f.ring && !f.pinky) return "Stop";
  if (f.thumb && !f.index && !f.middle && !f.ring && !f.pinky) {
    if (lm[4].y < lm[0].y - 0.05) return "Yes";
    if (lm[4].y > lm[0].y + 0.05) return "No";
  }
  if (f.index && f.middle && !f.ring && !f.pinky) return "Peace";
  if (f.thumb && f.index && !f.middle && !f.ring && f.pinky) return "I love you";
  if (!f.thumb && f.index && !f.middle && !f.ring && !f.pinky) return "Wait";
  return null;
}

function onResults(results) {
  canvasEl.width = videoEl.videoWidth;
  canvasEl.height = videoEl.videoHeight;
  ctx.save();
  ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

  let detected = null;
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    for (const lm of results.multiHandLandmarks) {
      drawConnectors(ctx, lm, Hands.HAND_CONNECTIONS, { color: '#6b8c7a', lineWidth: 2 });
      drawLandmarks(ctx, lm, { color: '#c9832f', lineWidth: 1, radius: 3 });
      const sign = classifySign(lm);
      if (sign) detected = sign;
    }
  }

  if (detected && detected === stableSign) {
    stableCount++;
  } else {
    stableSign = detected;
    stableCount = 0;
  }

  if (detected && stableCount >= STABLE_FRAMES_NEEDED) {
    signLabel.textContent = detected;
    signLabel.classList.remove('idle');
    speak(detected);
  } else if (!detected) {
    signLabel.textContent = "…";
    signLabel.classList.add('idle');
  }
  ctx.restore();
}

const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.6
});
hands.onResults(onResults);

let camera = null;

startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  startBtn.textContent = "Starting…";
  try {
    camera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 640,
      height: 480
    });
    await camera.start();
    statusDot.classList.add('live');
    startBtn.textContent = "Camera live";
    signLabel.textContent = "watching…";
  } catch (err) {
    signLabel.textContent = "Camera access denied or unavailable.";
    startBtn.disabled = false;
    startBtn.textContent = "Start camera";
  }
});
</script>

</body>
</html>
